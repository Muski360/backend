<!doctype html>
<html lang="pt-br" xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/experience.css}" href="/css/experience.css">
    <title>Editar Funcionario</title>
</head>

<body class="fx-body">
    <canvas id="scene3d" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>

    <main class="content-shell">
        <div th:insert="~{fragmentos/header :: header}"></div>

        <section class="main-panel">
            <h1 class="fx-title">Oficina de Edicao</h1>
            <p class="fx-subtitle">Ajuste dados do colaborador em tempo real.</p>

            <form method="post" th:action="@{/editarfuncionario}" class="fx-form">
                <div class="form-group fx-grid">
                    <div>
                        <label for="id" class="fx-label">ID</label>
                        <input type="text" class="form-control fx-input" id="id" th:value="${funcionario.id}" disabled>
                        <input type="hidden" name="id" th:value="${funcionario.id}">
                    </div>

                    <div>
                        <label for="nome" class="fx-label">Nome</label>
                        <input type="text" class="form-control fx-input" name="nome" id="nome" th:value="${funcionario.nome}" required>
                    </div>

                    <div>
                        <label for="email" class="fx-label">Email</label>
                        <input type="email" class="form-control fx-input" name="email" id="email" th:value="${funcionario.email}" required>
                    </div>
                </div>
                <button type="submit" class="btn fx-btn">Atualizar Registro</button>
            </form>
        </section>
    </main>

    <script type="module" th:src="@{/js/scene3d.js}" src="/js/scene3d.js"></script>
</body>

</html>
