<!doctype html>
<html lang="pt-br" xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionarios</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/experience.css}" href="/css/experience.css">
</head>

<body class="fx-body">
    <canvas id="scene3d" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>

    <main class="content-shell">
        <div th:insert="~{fragmentos/header :: header}"></div>

        <section class="main-panel">
            <h1 class="fx-title">Cadastro Neural</h1>
            <p class="fx-subtitle">Registre novos profissionais no sistema.</p>

            <form method="post" th:action="@{/funcionario}" class="fx-form">
                <div class="form-group fx-grid">
                    <div>
                        <label for="nome" class="fx-label">Nome</label>
                        <input class="form-control fx-input" type="text" name="nome" id="nome" required>
                    </div>

                    <div>
                        <label for="email" class="fx-label">Email</label>
                        <input class="form-control fx-input" type="email" name="email" id="email" required>
                    </div>
                </div>
                <button type="submit" class="btn fx-btn">Salvar Funcionario</button>
            </form>
        </section>
    </main>

    <script type="module" th:src="@{/js/scene3d.js}" src="/js/scene3d.js"></script>
</body>

</html>
