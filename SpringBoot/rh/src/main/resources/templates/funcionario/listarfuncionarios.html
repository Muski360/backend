<!doctype html>
<html lang="pt-br" xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/experience.css}" href="/css/experience.css">
    <title>Listagem de Funcionarios</title>
</head>

<body class="fx-body">
    <canvas id="scene3d" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>

    <main class="content-shell">
        <div th:insert="~{fragmentos/header :: header}"></div>

        <section class="main-panel">
            <h1 class="fx-title">Painel de Funcionarios</h1>
            <p class="fx-subtitle">Visualizacao completa do banco de pessoas.</p>

            <div class="table-stage">
                <table class="table table-hover table-responsive w-100 fx-table">
                    <thead>
                        <tr>
                            <th scope="col">Nome</th>
                            <th scope="col">E-mail</th>
                            <th scope="col">Acoes</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="funcionario : ${funcionarios}">
                            <td><span th:text="${funcionario.nome}"></span></td>
                            <td><span th:text="${funcionario.email}"></span></td>
                            <td class="actions">
                                <a th:href="@{'/deletarfuncionario/' + ${funcionario.id}}" class="btn fx-btn fx-danger">Excluir</a>
                                <a th:href="@{'/editarfuncionario/' + ${funcionario.id}}" class="btn fx-btn">Editar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" th:src="@{/js/scene3d.js}" src="/js/scene3d.js"></script>
</body>

</html>
