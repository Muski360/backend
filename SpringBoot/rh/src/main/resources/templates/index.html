<!doctype html>
<html lang="pt-br" xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/experience.css}" href="/css/experience.css">
    <title>Radar de Funcionarios</title>
</head>

<body class="fx-body">
    <canvas id="scene3d" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>

    <main class="content-shell">
        <div th:insert="~{fragmentos/header :: header}"></div>

        <section class="main-panel">
            <h1 class="fx-title">Radar de Talentos</h1>
            <p class="fx-subtitle" th:text="${msg}"></p>

            <form method="post" class="fx-form">
                <label for="buscar" class="fx-label">Buscar por nome</label>
                <div class="search-wrap">
                    <input type="text" name="buscar" id="buscar" class="form-control fx-input" placeholder="Ex: Murilo" required>
                    <button type="submit" class="btn fx-btn">Escanear</button>
                </div>
            </form>

            <div class="table-stage" th:if="${funcionarios != null}">
                <table class="table table-hover table-responsive w-100 fx-table">
                    <thead>
                        <tr>
                            <th scope="col">Nome</th>
                            <th scope="col">E-mail</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="funcionario : ${funcionarios}">
                            <td><span th:text="${funcionario.nome}"></span></td>
                            <td><span th:text="${funcionario.email}"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" th:src="@{/js/scene3d.js}" src="/js/scene3d.js"></script>
</body>

</html>
